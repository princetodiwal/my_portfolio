<!-- VANTA -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

<script>
VANTA.NET({
    el: "body",
    color: 0x24405c,
    backgroundColor: 0x16181d,
    points: 12,
    maxDistance: 22,
    spacing: 18
});
</script>

<!-- SCROLLREVEAL -->
<script src="https://unpkg.com/scrollreveal"></script>

{% block scripts %}{% endblock %}




<script>
document.addEventListener("DOMContentLoaded", function () {

    // Init ScrollReveal only once
    ScrollReveal({
        reset: false,
        distance: '60px',
        duration: 1200,
        delay: 150
    });

    /* GLOBAL FOOTER ANIMATION */
    ScrollReveal().reveal('.site-footer h3', {
        origin: 'top',
        delay: 200
    });

    ScrollReveal().reveal('.site-footer p', {
        origin: 'bottom',
        delay: 300
    });

    ScrollReveal().reveal('.footer-links a', {
        origin: 'bottom',
        interval: 120,
        delay: 400
    });

    ScrollReveal().reveal('.footer-bottom', {
        origin: 'bottom',
        delay: 500
    });

});
</script>



</body>
